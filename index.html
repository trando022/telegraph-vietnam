<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điện Tín Tài Chính Realtime - Dịch từ CLS.cn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { font-family: system-ui; } .item { border-bottom: 1px solid #ddd; } </style>
</head>
<body class="bg-gray-950 text-white">
    <div class="max-w-3xl mx-auto p-4">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <h1 class="text-2xl font-bold text-green-400">📡 ĐIỆN TÍN CLS REALTIME (VIỆT NAM)</h1>
            <div id="google_translate_element" class="text-sm"></div>
        </div>

        <!-- Controls -->
        <div class="flex flex-wrap gap-3 mb-6">
            <input id="search" type="text" placeholder="🔍 Tìm kiếm từ khóa..." 
                   class="flex-1 bg-gray-900 p-3 rounded-lg text-white focus:outline-none">
            
            <select id="timeFilter" class="bg-gray-900 p-3 rounded-lg">
                <option value="all">Tất cả thời gian</option>
                <option value="today">Hôm nay</option>
                <option value="24h">24 giờ qua</option>
            </select>
            
            <div id="hashtagFilters" class="flex flex-wrap gap-2"></div>
        </div>

        <!-- List tin -->
        <div id="newsList" class="space-y-6"></div>

        <div class="text-center text-gray-500 text-xs mt-8">
            Cập nhật realtime mỗi 30 giây • Dữ liệu từ RSSHub (cls telegraph)
        </div>
    </div>

    <!-- Google Translate -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'zh-CN',
                includedLanguages: 'vi',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        let allItems = [];
        let activeHashtag = null;

        async function loadNews() {
            try {
                const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://rsshub.app/cls/telegraph&count=100');
                const data = await res.json();
                allItems = data.items.map(item => ({
                    time: new Date(item.pubDate).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                    date: new Date(item.pubDate),
                    content: item.title + "<br><br>" + (item.description || ''),
                    link: item.link,
                    hashtags: (item.description || '').match(/\[(.*?)\]/g) || []
                }));
                renderNews();
            } catch(e) {
                console.log("Lỗi tải tin:", e);
            }
        }

        function renderNews(filteredItems = allItems) {
            const list = document.getElementById('newsList');
            list.innerHTML = '';
            
            filteredItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item bg-gray-900 p-5 rounded-xl';
                div.innerHTML = `
                    <div class="flex gap-4">
                        <span class="text-green-400 font-mono text-sm whitespace-nowrap">${item.time}</span>
                        <div class="flex-1">
                            <div class="prose prose-invert text-white">${item.content}</div>
                            <a href="${item.link}" target="_blank" class="text-blue-400 text-xs mt-2 block">Đọc gốc →</a>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // Search & filter
        function filterNews() {
            const keyword = document.getElementById('search').value.toLowerCase();
            const timeFilter = document.getElementById('timeFilter').value;
            
            let filtered = allItems.filter(item => {
                const matchText = (item.content || '').toLowerCase().includes(keyword);
                let matchTime = true;
                if (timeFilter === 'today') {
                    matchTime = item.date.toDateString() === new Date().toDateString();
                } else if (timeFilter === '24h') {
                    matchTime = (Date.now() - item.date.getTime()) < 86400000;
                }
                return matchText && matchTime;
            });

            if (activeHashtag) {
                filtered = filtered.filter(item => item.hashtags.some(h => h.includes(activeHashtag)));
            }

            renderNews(filtered);
        }

        // Hashtag buttons
        function renderHashtags() {
            const container = document.getElementById('hashtagFilters');
            const allTags = [...new Set(allItems.flatMap(i => i.hashtags))];
            
            container.innerHTML = allTags.map(tag => `
                <button onclick="toggleHashtag('${tag}')" 
                        class="px-4 py-1 bg-gray-800 hover:bg-gray-700 rounded-full text-xs transition">
                    ${tag}
                </button>
            `).join('');
        }

        window.toggleHashtag = function(tag) {
            activeHashtag = activeHashtag === tag ? null : tag;
            filterNews();
        };

        // Event listeners
        document.getElementById('search').addEventListener('input', filterNews);
        document.getElementById('timeFilter').addEventListener('change', filterNews);

        // Load lần đầu + realtime
        loadNews();
        setInterval(() => {
            loadNews();
        }, 30000);

        // Render hashtag sau khi load
        setTimeout(() => {
            renderHashtags();
        }, 2000);
    </script>
</body>
</html>
